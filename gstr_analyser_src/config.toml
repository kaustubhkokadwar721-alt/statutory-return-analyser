# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║             GSTR Return Analyser — User Configuration                       ║
# ║                                                                              ║
# ║  Edit this file to customise the tool's behaviour for your engagement.      ║
# ║  All values shown are the built-in defaults — change only what you need.    ║
# ║  Restart the tool after saving changes.                                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ── IDENTITY ──────────────────────────────────────────────────────────────────
# These strings appear in the Summary sheet header of every output workbook.
# Leave blank to use the generic default titles.
[identity]
firm_name   = ""   # e.g. "P G Bhagwat LLP"
engagement  = ""   # e.g. "ABC Pvt Ltd – FY 2024-25 GST Audit"
prepared_by = ""   # e.g. "KP" — shows as "Prepared by: KP" in sub-header


# ── PATHS ─────────────────────────────────────────────────────────────────────
# Pre-fill the input / output folder fields in the TUI so you don't have to
# type the same path on every run.  Absolute paths only.  Leave blank to start
# with an empty field as before.
[paths]
default_input_dir  = ""   # e.g. "C:/GST Clients/ABC/FY2425/PDFs"
default_output_dir = ""   # e.g. "C:/GST Clients/ABC/FY2425/Reports"


# ── PROCESSING ────────────────────────────────────────────────────────────────
[processing]
# Maximum parallel PDF-parsing threads.
# Raise for faster batch runs on multi-core machines (e.g. 8).
# Lower to 1 if you hit memory pressure on large PDFs.
max_workers = 4

# Set false to force re-parsing every PDF on every run (useful when debugging
# a parser fix).  Cache is still written so you can re-enable later.
cache_enabled = true

# Auto-purge cached parse results older than this many days.
# Prevents the .pkl file growing indefinitely across long engagements.
# Set 0 to never purge automatically.
cache_max_age_days = 30


# ── OUTPUT ────────────────────────────────────────────────────────────────────
[output]
# Output workbook filenames.  Extension must remain .xlsx.
gstr1_auditor_filename    = "GSTR1_Auditor_Master.xlsx"
gstr1_analytics_filename  = "GSTR1_Analytics_Master.xlsx"
gstr3b_auditor_filename   = "GSTR3B_Auditor_Master.xlsx"
gstr3b_analytics_filename = "GSTR3B_Analytics_Master.xlsx"

# Open the completed output workbooks in Excel automatically when done.
open_on_completion = false


# ── FORMATTING ────────────────────────────────────────────────────────────────
[formatting]
# Number grouping style for all currency/amount columns in Excel output.
#   "indian"        → ##,##,##0      (e.g. 12,34,56,789)
#   "international" → #,##0          (e.g. 123,456,789)
number_format = "indian"

# Date display format for Period_Year cells in Excel.
#   "mmm-yy"   → Apr-25
#   "mmm-yyyy" → Apr-2025
date_format = "mmm-yy"

# Minimum Excel column width (characters).  Columns with short data are padded
# to at least this width to avoid cramped headers.
min_column_width = 12


# ── SANITY CHECKS ─────────────────────────────────────────────────────────────
# Thresholds and toggles for all built-in validation checks.
# Individual checks can be disabled by removing their name from the
# 'enabled' list below — useful when a client has known, explained anomalies.
[checks]

# ── Shared tolerance ──────────────────────────────────────────────────────────
# Rounding tolerance (₹) applied to all absolute-variance comparisons.
# Values within this band are treated as PASS.  Default 1.0 covers normal
# PDF-rounding artefacts.  Set 0.0 for strict zero-tolerance audits.
variance_tolerance = 1.0

# ── GSTR-1 thresholds ─────────────────────────────────────────────────────────
# Maximum allowed % divergence between HSN Grand Total and the sum of primary
# supply tables (4A + 4B + 5 + 6A + 6B + 6C + 7) before a WARN is raised.
# Some ECO / SEZ clients legitimately exceed 10% — raise as needed.
hsn_supply_variance_pct = 10.0

# B2CL average invoice value floor (₹).  A FAIL is raised when the average
# invoice in Table 5 falls at or below this amount.  Statutory threshold is
# ₹2,50,000; change only if a specific legal position justifies it.
b2cl_invoice_threshold = 250000

# ── GSTR-3B thresholds ────────────────────────────────────────────────────────
# Maximum allowed % gap between RCM declared (Table 3.1d) and RCM ITC claimed
# (Table 4.A.3) before a WARN is raised.  10% allows minor timing differences.
rcm_crosscheck_gap_pct = 10.0

# ── Check toggles ─────────────────────────────────────────────────────────────
# Remove a name from this list to suppress that check entirely.
# Suppressed checks produce no rows in EXCEPTIONS_LOG.
#
#  GSTR-1 check names:
#    Total_Liability       — computed sum vs reported footer per tax head
#    HSN_vs_Supply_Tables  — HSN grand total vs supply table sum
#    B2CL_Threshold        — average B2CL invoice below ₹2.5L
#    Record_Count          — Num_Records / Value mismatch in major sections
#    Interstate_Tax        — CGST/SGST present on inter-state sections
#    CDNR_Sign_Check       — net CDNR/CDNUR value is positive
#
#  GSTR-3B check names:
#    Payment_Recon_6_1     — ITC + Cash ≠ Net Tax Payable (Table 6.1)
#    ITC_Math              — ITC A – B ≠ Net C across all tax heads
#    RCM_CrossCheck        — RCM declared vs RCM ITC claimed gap
checks_enabled = [
  "Total_Liability",
  "HSN_vs_Supply_Tables",
  "B2CL_Threshold",
  "Record_Count",
  "Interstate_Tax",
  "CDNR_Sign_Check",
  "Payment_Recon_6_1",
  "ITC_Math",
  "RCM_CrossCheck",
]


# ── TEMPLATES ─────────────────────────────────────────────────────────────────
# Point to a custom Excel template to replace the built-in Summary sheet in the
# Analytics workbook.  Leave blank to use the default layout.
#
# How it works:
#   - The pipeline always writes the data sheets (Fact_Liability,
#     Dim_Taxpayer_Calendar, etc.) with their fixed schemas.
#   - Your template file can contain any additional sheets (pivots, custom
#     ratios, charts) built on SUMIFS / XLOOKUP formulas referencing those
#     data sheets — exactly like a Screener.in custom view.
#   - On each run, the data sheets are refreshed; your template sheets come
#     through untouched.
#
# Requirements for a valid template file:
#   - Must be a .xlsx file (not .xlsm / .xls).
#   - Must NOT contain sheets named after the data sheets (they will be
#     overwritten by the pipeline).
#   - Absolute path recommended.
[templates]
gstr1_template  = ""   # e.g. "C:/Templates/my_gstr1_analysis.xlsx"
gstr3b_template = ""   # e.g. "C:/Templates/my_gstr3b_analysis.xlsx"
